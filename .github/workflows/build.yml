name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libreadline-dev

      - name: Build
        run: make

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: Cluedo
          path: bin/release/Cluedo
